# GitHub-Notion Sync Configuration

[github]
token = "ghp_xxxxxxxxxxxx"
webhook_secret = ""

# Each account has a name, optional type ("org"), and a label for Notion grouping.
# The label appears as a select tag in the Notion visibility column.
[[github.accounts]]
name = "your-username"
label = "Personal"

[[github.accounts]]
name = "your-org"
type = "org"
label = "Organization"

[notion]
token = "ntn_xxxxxxxxxxxx"
database_id = "your_database_id_here"

# Notion DB property name overrides (defaults shown)
[notion.properties]
name = "Name"
url = "URL"
description = "Description"
last_commit = "Last Commit"
commit_count = "Commit Count"
visibility = "Visibility"
repo_id = "repository-id"

# Label for unmatched rows (missing repository-id)
[visibility]
error = "Error"
