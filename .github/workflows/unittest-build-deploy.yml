name: Test, Build & Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. 테스트 (항상 실행) ──
  test-backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v

  test-frontend:
    name: Frontend (vitest + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Lint
        working-directory: frontend
        run: npm run lint

  # ── 2. Docker 빌드 + 배포 (main만, 테스트 통과 후) ──
  deploy:
    name: Docker Build & Deploy
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Trigger NAS deploy
        if: success()
        env:
          NAS_URL: ${{ secrets.NAS_WEBHOOK_URL }}
          NAS_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
        run: |
          if [ -z "$NAS_URL" ]; then
            echo "::notice::NAS_WEBHOOK_URL not configured, skipping deploy"
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $NAS_TOKEN" \
            "$NAS_URL" \
            || echo "::warning::NAS webhook failed (NAS may be offline)"
