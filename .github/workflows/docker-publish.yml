name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Trigger NAS deploy
        if: success()
        env:
          NAS_URL: ${{ secrets.NAS_WEBHOOK_URL }}
          NAS_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
        run: |
          if [ -z "$NAS_URL" ]; then
            echo "::notice::NAS_WEBHOOK_URL not configured, skipping deploy"
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $NAS_TOKEN" \
            "$NAS_URL" \
            || echo "::warning::NAS webhook failed (NAS may be offline)"
